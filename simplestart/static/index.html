  <body>

    <!-- 前端配置 - 默认前后端分离部署配置 -->
    <script src="./config.js"></script>
    <script>
        // 确保 SS_CONFIG 变量存在（如果 config.js 不存在或未定义）
        // 如果 config.js 文件不存在，使用默认配置（backendServer为空字符串表示使用相对路径）
        // 启动命令示例：ss app.py --port 8000 --allow-origins "*"（用于前后端分离部署）
        if (typeof window.SS_CONFIG === 'undefined') {
            window.SS_CONFIG = {
                backendServer: ""
            };
        }
        console.log('前端配置已加载:', window.SS_CONFIG);
    </script>
    <div id="app"></div>
	
    

  </body>
