name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '🎯 手动触发选项：是否发布到 PyPI？'
        required: true
        type: choice
        options:
          - none
          - testpypi
          - pypi
        default: 'none'

jobs:
  # --- 任务 1: 构建 Wheels ---
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 我们将 Linux 单独处理，因为它需要特殊工具
        os: [windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      # Windows 和 macOS 使用标准的 build 方式
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Wheel
        run: python -m build --wheel

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*.whl

  # --- 任务 1.5: 专门构建 Linux Wheels (使用 cibuildwheel) ---
  build_wheels_linux:
    name: Build Linux wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Linux 必须使用 cibuildwheel 才能生成 PyPI 认可的 manylinux 包
      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.19.2
        env:
          # 指定要构建的 Python 版本
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          # 跳过 32 位系统或其他不需要的架构
          CIBW_SKIP: "*i686 *musllinux*"
          # 如果你的包需要编译 C/C++ 代码，可能需要在这里安装依赖
          # CIBW_BEFORE_BUILD: "yum install -y gcc gcc-c++" (CentOS 环境)

      - name: Upload Linux Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: wheelhouse/*.whl # cibuildwheel 默认输出到 wheelhouse 文件夹

  # --- 任务 2: 构建源码包 (Sdist) ---
  build_sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build Sdist
        run: python -m build --sdist
      - name: Upload Sdist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # --- 任务 3: 上传到 PyPI ---
  publish_to_pypi:
    name: 🚀 Publish to PyPI
    needs: [build_wheels, build_wheels_linux, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'pypi'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # 调试：看看下载了什么
      - name: List files
        run: ls -R dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
