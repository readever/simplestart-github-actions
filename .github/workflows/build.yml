name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '🎯 手动触发选项：是否发布到 PyPI？'
        required: true
        type: choice
        options:
          - none
          - testpypi
          - pypi
        default: 'none'

jobs:
  # --- 任务 1: 构建 Wheel ---
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    env:
      ARCHFLAGS: -arch x86_64 -arch arm64
      MACOSX_DEPLOYMENT_TARGET: "10.9"

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel
      - name: Build Wheel
        run: python -m build --wheel
      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*.whl

  # --- 任务 2: 构建源码包 ---
  build_sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build Sdist
        run: python -m build --sdist
      - name: Upload Sdist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # --- 任务 3: 上传到 PyPI (已修复路径问题) ---
  publish_to_pypi:
    name: 🚀 Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'pypi'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      # 【新增】调试步骤：打印文件列表，确认文件确实在 ./dist 里
      - name: Check downloaded files
        run: |
          echo "Listing files in current directory:"
          ls -R

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # 【关键修复】显式指定包所在的目录
          packages-dir: ./dist
          # 如果你之前配置了 Trusted Publisher，其实不需要 password
          # 如果没有配置 Trusted Publisher，才需要下面这行：
          # password: ${{ secrets.PYPI_TOKEN }}
