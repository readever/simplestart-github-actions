name: Build Wheels

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    
    # -------------------------------------------------------
    # 关键修复：添加环境变量 (解决 macOS 架构问题)
    # -------------------------------------------------------
    env:
      # 针对 macOS：强制编译为 Universal2 (兼容 Intel 和 M1/M2)
      ARCHFLAGS: -arch x86_64 -arch arm64
      # 针对 macOS：指定最低支持的系统版本
      MACOSX_DEPLOYMENT_TARGET: "10.9"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # -------------------------------------------------------
      # 关键修复：安装系统依赖 (解决编译器缺失问题)
      # -------------------------------------------------------
      - name: Install System Dependencies
        if: runner.os == 'Linux'
        run: |
          # Ubuntu 需要安装系统编译器
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Xcode Tools (macOS)
        if: runner.os == 'macOS'
        run: |
          # 确保 Xcode 命令行工具就绪
          xcode-select --install || true
          # 安装 python-dev 等头文件 (macOS 特定)
          brew install python@${{ matrix.python-version }}

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # 必须先安装构建依赖
          pip install Cython setuptools wheel build

      - name: Build wheels
        run: python -m build --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*.whl

  # --- 下面的 sdist 和 upload 部分保持不变 (为了完整性保留) ---
  
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython setuptools wheel build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*,sdist
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
