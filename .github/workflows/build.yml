name: Build Wheels

# 仅保留手动触发
on:
  workflow_dispatch:

jobs:
  # --- 原有的构建任务保持不变 ---
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    
    env:
      ARCHFLAGS: -arch x86_64 -arch arm64
      MACOSX_DEPLOYMENT_TARGET: "10.9"

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install System Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Install Xcode Tools (macOS)
        if: runner.os == 'macOS'
        run: xcode-select --install || true
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Cython setuptools wheel build
      - name: Build wheels
        run: python -m build --wheel
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install cython setuptools wheel build
      - name: Build sdist
        run: python -m build --sdist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # --- 新增：聚合所有产物并打包成 ZIP ---
  collect_all:
    name: Collect and Zip All Artifacts
    needs: [build_wheels, build_sdist] # 必须等上面都做完
    runs-on: ubuntu-latest
    steps:
      # 1. 下载所有 whl 和 sdist 文件，并合并到一个文件夹
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*,sdist
          merge-multiple: true
          path: all_builds

      # 2. 查看一下文件，确认数量（可选）
      - name: List files
        run: ls -lh all_builds

      # 3. 打包成 zip
      - name: Zip all files
        run: |
          cd all_builds
          # 打包成 complete-release.zip
          zip -r ../complete-release.zip .

      # 4. 上传这个唯一的 zip 包
      - name: Upload complete zip
        uses: actions/upload-artifact@v4
        with:
          name: complete-release # 下载时这个名字会显示在列表里
          path: complete-release.zip

  # --- 原有的发布任务 ---
  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*,sdist
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
